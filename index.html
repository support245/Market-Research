<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Strategic Market Entry | U.S. Healthcare Market</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;}

html,
body{
  width:100%;
  height:100%;
  overflow:hidden;
}

:root{
  --bg:#ffffff;
  --text:#0f172a;
  --muted:#64748b;
  --subtle:#94a3b8;
  --border:#e5e7eb;

  --navy:#0b2a5b;
  --blue:#1f4ea3;
  --blue2:#1d4ed8;
  --accent:#f59e0b;

  --max:1100px;
  --radius:16px;
}

body{
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  background:var(--bg);
  color:var(--text);
  line-height:1.55;
  margin:0;
  padding:0;
  overflow:hidden;
}

a{color:inherit;text-decoration:none;}
img{max-width:100%;height:auto;display:block;}
.wrap{
  max-width:var(--max);
  margin:0 auto;
  padding:0 24px;
}
.rule{height:1px;background:var(--border);}

/* ===== Top hero ===== */
.page{
  padding:64px 0 34px;
}
.heroGrid{
  display:grid;
  grid-template-columns: 1.05fr .95fr;
  gap:38px;
  align-items:center;
}
.pill{
  display:inline-flex;
  align-items:center;
  gap:10px;
  padding:6px 10px;
  border-radius:999px;
  background:#eef2ff;
  color:#1e40af;
  font-weight:800;
  font-size:11px;
  letter-spacing:.06em;
  text-transform:uppercase;
  margin-bottom:18px;
}
.h1{
  font-size:clamp(38px, 4.7vw, 64px);
  line-height:1.02;
  font-weight:950;
  letter-spacing:.01em;
  text-transform:uppercase;
  color:var(--text);
}
.h1 .accent{color:var(--blue2);}
.lead{
  margin-top:16px;
  max-width:62ch;
  font-size:14px;
  color:var(--muted);
}
.heroBtns{
  display:flex;
  gap:12px;
  margin-top:20px;
  flex-wrap:wrap;
}
.btnPrimary{
  display:inline-flex;
  align-items:center;
  gap:10px;
  background:var(--blue2);
  color:#fff;
  border:1px solid var(--blue2);
  border-radius:10px;
  padding:12px 14px;
  font-weight:900;
  letter-spacing:.06em;
  text-transform:uppercase;
  font-size:12px;
  cursor:pointer;
}
.btnPrimary:hover{opacity:.96;transform:translateY(-1px);transition:.15s ease;}
.btnGhost{
  display:inline-flex;
  align-items:center;
  gap:10px;
  background:#fff;
  color:var(--text);
  border:1px solid var(--border);
  border-radius:10px;
  padding:12px 14px;
  font-weight:800;
  letter-spacing:.02em;
  font-size:12px;
  cursor:pointer;
}
.btnGhost:hover{background:#f8fafc;transform:translateY(-1px);transition:.15s ease;}
.btnIcon{width:16px;height:16px;display:inline-block;}

.heroMedia{
  justify-self:end;
  width:min(520px, 100%);
  border-radius:14px;
  overflow:hidden;
  border:1px solid var(--border);
  background:#0b1220;
}
.heroMedia img{width:100%;filter:saturate(1);}

/* ===== Section building blocks ===== */
.section{padding:34px 0 58px;}
.sectionTitle{
  margin-top:34px;
  font-size:22px;
  font-weight:950;
  letter-spacing:.02em;
  text-transform:uppercase;
  color:var(--text);
}
.sectionSub{
  margin-top:8px;
  color:var(--muted);
  font-size:13px;
  max-width:80ch;
}

/* Cards row */
.cards3{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:14px;
  margin-top:18px;
}
.card{
  border:1px solid var(--border);
  border-radius:14px;
  background:#fff;
  padding:16px;
}
.cardLabel{
  font-size:11px;
  letter-spacing:.12em;
  text-transform:uppercase;
  font-weight:900;
  color:var(--subtle);
}
.cardText{
  margin-top:10px;
  font-size:13px;
  color:var(--text);
  font-weight:700;
}
.cardText span{color:var(--muted);font-weight:600;}

/* Two col + mini cards */
.twocol{
  display:grid;
  grid-template-columns: 1fr 1fr;
  gap:18px;
  align-items:start;
  margin-top:18px;
}
.list2{
  display:grid;
  grid-template-columns: 1fr 1fr;
  gap:14px;
}
.mini{
  border:1px solid var(--border);
  border-radius:14px;
  padding:14px;
  background:#fff;
  min-height:92px;
}
.miniHead{
  display:flex;
  align-items:center;
  gap:10px;
  font-weight:950;
  letter-spacing:.02em;
  text-transform:uppercase;
  font-size:12px;
  color:var(--text);
}
.dot{
  width:22px;height:22px;border-radius:999px;
  display:grid;place-items:center;
  background:#eef2ff;
  border:1px solid #dbeafe;
  color:#1e40af;
  font-weight:950;
  font-size:12px;
}
.miniText{
  margin-top:10px;
  color:var(--muted);
  font-size:12.5px;
}

/* Approach */
.approach{
  margin-top:26px;
  border-top:1px solid var(--border);
  padding-top:26px;
}
.approachGrid{
  display:grid;
  grid-template-columns: .9fr 1.1fr;
  gap:18px;
  align-items:center;
  margin-top:14px;
}
.approachMedia{
  border:1px solid var(--border);
  border-radius:14px;
  overflow:hidden;
  background:#f8fafc;
}
.phase{
  border:1px solid var(--border);
  border-radius:14px;
  background:#fff;
  padding:16px;
}
.phaseKicker{
  font-size:11px;
  letter-spacing:.12em;
  text-transform:uppercase;
  color:var(--blue);
  font-weight:950;
}
.phaseTitle{
  margin-top:8px;
  font-weight:950;
  text-transform:uppercase;
  letter-spacing:.02em;
}
.phaseList{
  margin-top:10px;
  padding-left:18px;
  color:var(--muted);
  font-size:12.5px;
}
.pillsRow{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  margin-top:12px;
}
.pillSmall{
  border:1px solid var(--border);
  border-radius:10px;
  padding:8px 10px;
  font-size:11px;
  color:var(--muted);
  background:#fff;
  font-weight:800;
}

/* Value delivered */
.valueGrid{
  display:grid;
  grid-template-columns: 1.05fr .95fr;
  gap:14px;
  margin-top:16px;
}
.valueBig{
  border:1px solid #1e40af;
  background:#1e40af;
  color:#fff;
  border-radius:14px;
  padding:18px;
}
.valueBig h3{font-size:14px;letter-spacing:.02em;font-weight:950;}
.valueBig p{margin-top:10px;color:rgba(255,255,255,.85);font-size:12.5px;}
.valueInner{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:14px;
}
.valueTile{
  border:1px solid rgba(255,255,255,.25);
  border-radius:12px;
  padding:12px;
  background:rgba(255,255,255,.06);
}
.valueTile .k{
  font-size:10px;
  letter-spacing:.12em;
  text-transform:uppercase;
  font-weight:950;
  color:rgba(255,255,255,.8);
}
.valueTile .t{margin-top:8px;font-size:12px;font-weight:800;color:#fff;}
.valueSide{
  border:1px solid var(--border);
  border-radius:14px;
  padding:18px;
  background:#f8fafc;
}
.valueSide h3{font-size:13px;font-weight:950;}
.valueSide p{margin-top:10px;color:var(--muted);font-size:12.5px;}
.check{
  display:flex;
  align-items:flex-start;
  gap:10px;
  margin-top:10px;
  color:var(--muted);
  font-size:12.5px;
}
.check span{
  width:18px;height:18px;border-radius:999px;
  display:grid;place-items:center;
  background:#eef2ff;
  border:1px solid #dbeafe;
  color:#1e40af;
  font-weight:950;
  flex:0 0 auto;
}

/* Market opportunity assessment */
.assessGrid{
  display:grid;
  grid-template-columns: 1fr 1fr;
  gap:18px;
  align-items:center;
  margin-top:16px;
}
.rankList{display:grid;gap:10px;}
.rankItem{
  border:1px solid var(--border);
  border-radius:12px;
  padding:12px;
  background:#fff;
}
.rankTop{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
}
.rankName{font-weight:950;text-transform:uppercase;font-size:12px;}
.badge{
  border:1px solid #dbeafe;
  background:#eef2ff;
  color:#1e40af;
  border-radius:999px;
  padding:6px 10px;
  font-size:10px;
  font-weight:950;
  letter-spacing:.08em;
  text-transform:uppercase;
  white-space:nowrap;
}
.bar{
  margin-top:10px;
  height:8px;
  border-radius:999px;
  background:#eef2ff;
  overflow:hidden;
  border:1px solid #dbeafe;
}
.bar > div{height:100%;background:#1d4ed8;width:60%;}
.rankSub{margin-top:8px;font-size:12px;color:var(--muted);}
.assessMedia{
  border:1px solid var(--border);
  border-radius:14px;
  overflow:hidden;
  background:#fff;
}

/* Recommendations */
.recoTitle{
  text-align:center;
  margin-top:44px;
  font-weight:950;
  text-transform:uppercase;
  letter-spacing:.02em;
  font-size:18px;
}
.recoGrid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:14px;
  margin-top:16px;
}
.reco{
  border:1px solid var(--border);
  border-radius:14px;
  padding:16px;
  background:#fff;
}
.recoNum{
  width:28px;height:28px;
  border-radius:8px;
  background:#1d4ed8;
  color:#fff;
  display:grid;place-items:center;
  font-weight:950;
}
.reco h4{
  margin-top:10px;
  font-weight:950;
  text-transform:uppercase;
  font-size:12px;
}
.reco p{margin-top:10px;color:var(--muted);font-size:12.5px;}

/* Bottom CTA */
.cta{
  margin-top:24px;
  border-radius:16px;
  background:#1e40af;
  color:#fff;
  padding:34px 18px;
  text-align:center;
}
.cta h3{
  font-size:22px;
  font-weight:950;
  text-transform:uppercase;
  line-height:1.1;
}
.cta p{
  margin:12px auto 0;
  max-width:70ch;
  font-size:12.5px;
  color:rgba(255,255,255,.85);
}
.ctaRow{
  margin-top:18px;
  display:flex;
  justify-content:center;
  gap:10px;
  flex-wrap:wrap;
}
.cta .btnGhost{background:#fff;border-color:#fff;}

/* Responsive */
@media (max-width: 980px){
  .heroGrid{grid-template-columns:1fr;gap:22px;}
  .heroMedia{justify-self:start;}
  .cards3{grid-template-columns:1fr;}
  .twocol{grid-template-columns:1fr;}
  .list2{grid-template-columns:1fr;}
  .approachGrid{grid-template-columns:1fr;}
  .valueGrid{grid-template-columns:1fr;}
  .assessGrid{grid-template-columns:1fr;}
  .recoGrid{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<div class="wrap page">
  <div class="heroGrid">
    <div>
      <div class="pill">Case Study</div>

      <h1 class="h1">
        Strategic<br>
        Market<br>
        Entry:<br>
        <span class="accent">U.S.<br>Healthcare<br>Market</span>
      </h1>

      <p class="lead">
        How a global manufacturer validated a new market opportunity and developed a data-driven roadmap for expansion.
      </p>

      <div class="heroBtns">
        <a class="btnGhost" href="#book" id="bookMeetingBtn">
          <svg class="btnIcon" viewBox="0 0 24 24" fill="none">
            <path d="M8 7V5m8 2V5M6 11h12M7 9h10a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2v-8a2 2 0 0 1 2-2z" stroke="currentColor" stroke-width="2"/>
          </svg>
          Book a Meeting
        </a>
      </div>
    </div>

    <div class="heroMedia">
      <img src="market-entry-hero.jpg" alt="U.S. healthcare market entry hero image">
    </div>
  </div>
</div>

</body>
</html>
